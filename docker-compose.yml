version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sunforest-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sunforest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sunforest123}
      POSTGRES_DB: ${POSTGRES_DB:-sunforest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sunforest} -d ${POSTGRES_DB:-sunforest}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sunforest-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sunforest-backend
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-sunforest}:${POSTGRES_PASSWORD:-sunforest123}@postgres:5432/${POSTGRES_DB:-sunforest}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sunforest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sunforest-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    networks:
      - sunforest-network

volumes:
  postgres_data:
  uploads_data:

networks:
  sunforest-network:
    driver: bridge
