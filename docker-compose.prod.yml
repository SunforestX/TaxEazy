version: "3.8"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sunforest-postgres-prod
    env_file:
      - .env.production
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 256m
    logging: *default-logging
    networks:
      - sunforest-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sunforest-backend-prod
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
      - ENVIRONMENT=${ENVIRONMENT}
      - DEBUG=${DEBUG}
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: always
    mem_limit: 256m
    logging: *default-logging
    networks:
      - sunforest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://tax.sunforestx.com.au/api}
    container_name: sunforest-frontend-prod
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_TELEMETRY_DISABLED=${NEXT_TELEMETRY_DISABLED}
    depends_on:
      - backend
    restart: always
    mem_limit: 256m
    logging: *default-logging
    networks:
      - sunforest-network

  nginx:
    image: nginx:alpine
    container_name: sunforest-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: always
    mem_limit: 64m
    logging: *default-logging
    networks:
      - sunforest-network

  certbot:
    image: certbot/certbot
    container_name: sunforest-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    restart: always
    mem_limit: 64m
    logging: *default-logging
    networks:
      - sunforest-network

volumes:
  postgres_data:
  uploads_data:
  certbot-conf:
  certbot-www:

networks:
  sunforest-network:
    driver: bridge
